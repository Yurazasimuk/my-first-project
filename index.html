
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERO | Сучасний мінімалізм</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(180deg, #f3f4f6 0%, #ffffff 100%); }
        .product-card:hover .product-image { transform: scale(1.05); }
    </style>
</head>
<body class="bg-white text-gray-900">

    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-2xl font-bold tracking-tighter uppercase">MERO</div>

            <div class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest">
                <a href="#" class="hover:text-gray-500 transition">Колекції</a>
                <a href="#" class="hover:text-gray-500 transition">Чоловікам</a>
                <a href="#" class="hover:text-gray-500 transition">Жінкам</a>
                <a href="#" class="hover:text-gray-500 transition">Про нас</a>
            </div>

            <div class="flex items-center space-x-6">
                <i data-lucide="search" class="w-5 h-5 cursor-pointer"></i>
                <div class="relative cursor-pointer">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </div>
                <i data-lucide="menu" class="w-6 h-6 md:hidden cursor-pointer"></i>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center hero-gradient pt-20">
        <div class="text-center px-4">
            <span class="inline-block text-xs uppercase tracking-[0.3em] mb-4 text-gray-500 animate-fade-in">Нова колекція 2026</span>
<h1 class="text-5xl md:text-8xl font-light tracking-tight mb-8">MERO COLLECTION 2026</h1>
            <a href="#shop" class="inline-block border-b border-black pb-2 text-sm font-semibold hover:text-gray-500 hover:border-gray-500 transition-all">
                ДИВИТИСЬ КАТАЛОГ
            </a>
        </div>
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce">
            <i data-lucide="chevron-down" class="text-gray-300"></i>
        </div>
    </section>

    <section id="shop" class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-3xl font-light">Бестселери</h2>
                <p class="text-gray-400 mt-2 text-sm">Основа вашого гардеробу</p>
            </div>
            <button class="text-sm underline">Всі товари</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="product-card group cursor-pointer">
                <div class="relative overflow-hidden bg-gray-100 aspect-[3/4]">
                    <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=800&auto=format&fit=crop"
                         alt="Одяг" class="product-image object-cover w-full h-full transition-transform duration-700">
                    <div class="absolute bottom-4 left-4 right-4 translate-y-12 group-hover:translate-y-0 transition-transform duration-300">
                        <button class="w-full bg-black text-white py-3 text-xs uppercase tracking-widest">Додати у кошик</button>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-start">
                    <div>
                        <h3 class="text-sm font-medium">Лляний жакет</h3>
                        <p class="text-xs text-gray-400 mt-1">Light Beige</p>
                    </div>
                    <span class="text-sm font-semibold">2,400 ₴</span>
                </div>
            </div>

            <div class="product-card group cursor-pointer">
                <div class="relative overflow-hidden bg-gray-100 aspect-[3/4]">
                    <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=800&auto=format&fit=crop"
                         alt="Одяг" class="product-image object-cover w-full h-full transition-transform duration-700">
                    <div class="absolute bottom-4 left-4 right-4 translate-y-12 group-hover:translate-y-0 transition-transform duration-300">
                        <button class="w-full bg-black text-white py-3 text-xs uppercase tracking-widest">Додати у кошик</button>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-start">
                    <div>
                        <h3 class="text-sm font-medium">Класичний тренч</h3>
                        <p class="text-xs text-gray-400 mt-1">Sand Stone</p>
                    </div>
                    <span class="text-sm font-semibold">4,200 ₴</span>
                </div>
            </div>

            <div class="product-card group cursor-pointer">
                <div class="relative overflow-hidden bg-gray-100 aspect-[3/4]">
                    <img src="https://images.unsplash.com/photo-1554568218-0f1715e72254?q=80&w=800&auto=format&fit=crop"
                         alt="Одяг" class="product-image object-cover w-full h-full transition-transform duration-700">
                    <div class="absolute bottom-4 left-4 right-4 translate-y-12 group-hover:translate-y-0 transition-transform duration-300">
                        <button class="w-full bg-black text-white py-3 text-xs uppercase tracking-widest">Додати у кошик</button>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-start">
                    <div>
                        <h3 class="text-sm font-medium">Базова футболка</h3>
                        <p class="text-xs text-gray-400 mt-1">Optic White</p>
                    </div>
                    <span class="text-sm font-semibold">950 ₴</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="border-t border-gray-100 py-12">
    <div class="text-center text-sm">
        © 2026 MERO — Made with style
    </div>
</footer>

    <script>
        // Ініціалізація іконок
        lucide.createIcons();

        // Проста взаємодія: прокрутка змінює прозорість навігації
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('py-2');
                nav.classList.remove('py-4');
            } else {
                nav.classList.add('py-4');
                nav.classList.remove('py-2');
            }
        });
    </script>
</body>
</html>
